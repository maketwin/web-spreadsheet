<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/src/theme/tokens.css" />
  <link rel="stylesheet" href="/src/theme/dark.css" />
  <title>web-spreadsheet v1.0 demo</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--ss-bg); color: var(--ss-text); }
    .demo-info { padding: 6px 12px; color: var(--ss-text-light); border-top: 1px solid var(--ss-border); background: var(--ss-toolbar-bg); font-size: 12px; }
    .spreadsheet-host { width: 100%; height: calc(100vh - 31px); }
    .ss-root { display: flex; flex-direction: column; width: 100%; height: 100%; background: var(--ss-bg); color: var(--ss-text); }
    .ss-menu-bar { background: var(--ss-toolbar-bg); border-bottom: 1px solid var(--ss-border); box-shadow: 0 1px 2px rgba(0,0,0,.04); }
    .ss-menu-bar .ant-menu-horizontal { border-bottom: 0; background: transparent; line-height: 40px; }
    .ss-menu-label { min-width: 180px; display: inline-flex; justify-content: space-between; gap: 24px; align-items: center; }
    .ss-menu-label kbd { color: var(--ss-text-light); font: 12px ui-monospace, SFMono-Regular, Menlo, monospace; background: transparent; border: 0; }
    .ss-toolbar, .ss-bottom-bar { display: flex; gap: 8px; padding: 8px; background: var(--ss-toolbar-bg); border-bottom: 1px solid var(--ss-border); }
    .ss-bottom-bar { border-top: 1px solid var(--ss-border); border-bottom: 0; }
    .ss-canvas-wrap { position: relative; flex: 1; min-height: 0; overflow: hidden; }
    .ss-canvas { width: 100%; height: 100%; display: block; outline: none; }
    .ss-editor-overlay { position: absolute; box-sizing: border-box; padding: 0 5px; border: 2px solid var(--ss-accent); background: var(--ss-bg); color: var(--ss-text); font: 14px -apple-system, sans-serif; outline: none; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script type="module" src="/demo/main.ts"></script>
</body>
</html>
