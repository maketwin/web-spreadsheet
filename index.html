<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/src/theme/tokens.css" />
  <link rel="stylesheet" href="/src/theme/dark.css" />
  <title>web-spreadsheet v1.0 demo</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--ss-bg); color: var(--ss-text); }
    .demo-info { padding: 6px 12px; color: var(--ss-text-light); border-top: 1px solid var(--ss-border); background: var(--ss-toolbar-bg); font-size: 12px; }
    .spreadsheet-host { width: 100%; height: calc(100vh - 31px); }
    .ss-root { display: flex; flex-direction: column; width: 100%; height: 100%; background: var(--ss-bg); color: var(--ss-text); }
    .ss-menu-bar { background: var(--ss-toolbar-bg); border-bottom: 1px solid var(--ss-border); box-shadow: 0 1px 2px rgba(0,0,0,.04); }
    .ss-menu-strip { display: flex; align-items: center; gap: 2px; min-height: 38px; padding: 4px 8px; box-sizing: border-box; overflow-x: auto; }
    .ss-menu-trigger { display: inline-flex; align-items: center; gap: 6px; height: 30px; padding: 0 10px; color: var(--ss-text); background: transparent; border: 1px solid transparent; border-radius: 6px; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; white-space: nowrap; cursor: default; }
    .ss-menu-trigger:hover, .ss-menu-trigger:focus-visible, .ant-dropdown-open > .ss-menu-trigger { color: var(--ss-text); background: color-mix(in srgb, var(--ss-accent) 9%, transparent); border-color: color-mix(in srgb, var(--ss-accent) 20%, var(--ss-border)); outline: none; }
    .ss-menu-trigger .anticon { color: var(--ss-text-light); font-size: 14px; }
    .ss-menu-label { min-width: 180px; display: inline-flex; justify-content: space-between; gap: 24px; align-items: center; }
    .ss-menu-label kbd { color: var(--ss-text-light); font: 12px ui-monospace, SFMono-Regular, Menlo, monospace; background: transparent; border: 0; }
    .ss-interaction-toolbar { min-height: 38px; display: flex; align-items: center; padding: 5px 10px; background: var(--ss-toolbar-bg); border-bottom: 1px solid var(--ss-border); box-sizing: border-box; }
    .ss-interaction-toolbar .ant-btn-sm { width: 28px; height: 28px; padding-inline: 0; display: inline-flex; align-items: center; justify-content: center; border-radius: 6px; }
    .ss-interaction-toolbar .ant-divider-vertical { height: 22px; margin-inline: 4px; border-color: var(--ss-border); }
    .ss-toolbar-toggle { display: inline-flex; align-items: center; gap: 6px; height: 28px; color: var(--ss-text-light); font-size: 12px; white-space: nowrap; }
    .ss-formula-bar { display: grid; grid-template-columns: 72px 28px 1fr; gap: 8px; align-items: center; padding: 8px 10px; background: var(--ss-toolbar-bg); border-bottom: 1px solid var(--ss-border); }
    .ss-formula-fx { display: flex; align-items: center; justify-content: center; font: italic 12px ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--ss-text-light); }
    .ss-formula-name { display: flex; align-items: center; justify-content: center; height: 32px; font: 12px ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--ss-text-light); background: var(--ss-bg); border: 1px solid var(--ss-border); border-radius: 6px; }
    .ss-formula-input { width: 100%; height: 32px; padding: 0 10px; color: var(--ss-text); background: var(--ss-bg); border: 1px solid var(--ss-border); border-radius: 6px; outline: none; box-sizing: border-box; }
    .ss-formula-input:focus { border-color: var(--ss-accent); box-shadow: 0 0 0 2px color-mix(in srgb, var(--ss-accent) 15%, transparent); }
    .ss-toolbar, .ss-bottom-bar { display: flex; gap: 8px; padding: 8px; background: var(--ss-toolbar-bg); border-bottom: 1px solid var(--ss-border); }
    .ss-bottom-bar { border-top: 1px solid var(--ss-border); border-bottom: 0; z-index: 1; background: var(--ss-toolbar-bg); }
    .ss-status-bar { display: flex; align-items: center; gap: 12px; padding: 2px 12px; background: var(--ss-header-bg); border-top: 1px solid var(--ss-border); font-size: 12px; color: var(--ss-text-light); min-height: 24px; }
    .ss-status-item { white-space: nowrap; }
    .ss-status-spacer { flex: 1; }
    .ss-status-divider { color: var(--ss-border); }
    .ss-status-save { color: var(--ss-accent); }
    .ss-canvas-wrap { position: relative; flex: 1; min-height: 0; overflow: hidden; }
    .ss-canvas { width: 100%; height: 100%; display: block; outline: none; }
    .ss-editor-overlay { position: absolute; box-sizing: border-box; padding: 0 5px; border: 2px solid var(--ss-accent); background: var(--ss-bg); color: var(--ss-text); font: 14px -apple-system, sans-serif; outline: none; }
    canvas { display: block; }
    @media print {
      .ss-menu-bar, .ss-interaction-toolbar, .ss-formula-bar, .ss-status-bar, .ss-bottom-bar { display: none !important; }
      .ss-root { height: auto; }
      .ss-canvas-wrap { overflow: visible; }
      .ant-modal-root { display: none !important; }
    }
  </style>
</head>
<body>
  <script type="module" src="/demo/main.ts"></script>
</body>
</html>
